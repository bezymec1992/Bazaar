<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Successful</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/png" href="imgs/logo.png" sizes="32x32" />
    <link rel="apple-touch-icon" href="imgs/logo.png" />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/layout.css" />

    <style>
      .success {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 0 15px;
      }

      .success__box {
        max-width: 500px;
      }

      .success__icon {
        font-size: 60px;
        margin-bottom: 10px;
      }

      .success__title {
        font-size: 32px;
        margin-bottom: 10px;
      }

      .success__text {
        color: #c9a227;
        margin-bottom: 50px;
        opacity: 0.6;
      }

      .success__btn {
        padding: 12px 24px;
        background: #c9a227;
        color: black;
        transition: 0.3s;
        border-radius: 8px;
        font-weight: bold;
        margin-top: 20px;
        display: block;
      }
      .success__btn:hover {
        background: #ffe283;
        box-shadow: 0 0 12px rgba(212, 175, 55, 0.8);
      }
    </style>
  </head>

  <body>
    <section class="success">
      <div class="success__box">
        <div class="success__icon">
          <img src="imgs/logo.png" width="70" height="50" alt="logo" />
        </div>
        <h1 class="success__title">Payment Successful</h1>
        <p class="success__text">Thank you for your purchase.</p>
        <div id="orderInfo"></div>
        <a href="index.html" class="success__btn">Back to Home</a>
      </div>
    </section>

    <script src="js/image.js"></script>

    <script>
      (function () {
        const CACHE_KEY = 'products';
        const CACHE_TIME_KEY = 'products_timestamp';

        const container = document.getElementById('orderInfo');
        if (!container) return;

        const params = new URLSearchParams(window.location.search);
        const productId = params.get('productId');

        let products = [];
        try {
          products = JSON.parse(localStorage.getItem(CACHE_KEY) || '[]');
          if (!Array.isArray(products)) products = [];
        } catch {
          products = [];
        }

        const product = products.find(p => String(p.id) === String(productId));

        if (product) {
          const wrap = document.createElement('div');
          wrap.style.marginTop = '20px';

          const img = document.createElement('img');
          img.width = 300;
          img.style.borderRadius = '8px';
          img.alt = '';
          const src = optimizeImage(product.image, 400);
          if (src) img.src = src;

          const h3 = document.createElement('h3');
          h3.textContent = product.title != null ? String(product.title) : '';

          const priceP = document.createElement('p');
          const priceStrong = document.createElement('strong');
          priceStrong.textContent = 'Price: ';
          priceP.appendChild(priceStrong);
          priceP.appendChild(document.createTextNode(String(product.price) + ' €'));

          const idP = document.createElement('p');
          const idStrong = document.createElement('strong');
          idStrong.textContent = 'ID: ';
          idP.appendChild(idStrong);
          idP.appendChild(document.createTextNode(String(product.id)));

          wrap.appendChild(img);
          wrap.appendChild(h3);
          wrap.appendChild(priceP);
          wrap.appendChild(idP);
          container.appendChild(wrap);

          try {
            const updated = products.map(p =>
              String(p.id) === String(productId) ? { ...p, sold: true } : p
            );
            localStorage.setItem(CACHE_KEY, JSON.stringify(updated));
            localStorage.removeItem(CACHE_TIME_KEY);
          } catch (e) {
            console.error(e);
            localStorage.removeItem(CACHE_KEY);
            localStorage.removeItem(CACHE_TIME_KEY);
          }
        } else {
          const p = document.createElement('p');
          p.textContent = 'Order received successfully.';
          container.appendChild(p);
          localStorage.removeItem(CACHE_TIME_KEY);
        }

        setTimeout(() => {
          window.location.href = 'catalog.html';
        }, 3000);
      })();
    </script>
  </body>
</html>
